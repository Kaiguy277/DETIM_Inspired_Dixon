<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dixon Glacier DETIM -- Model Workbench</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.plot.ly/plotly-2.35.0.min.js"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<style>
:root{--bg:#0f1117;--bg2:#161822;--bg3:#1e2030;--bg4:#252840;--text:#e8e8e8;--text2:#a0a4b8;--text3:#6e7291;--accent:#6c8cff;--accent2:#5eead4;--accent3:#f59e0b;--red:#ef4444;--green:#22c55e;--blue:#3b82f6;--border:#2a2d42;--radius:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.6}
body.panel-open{overflow:hidden}
code,pre,.mono{font-family:'Fira Code',monospace;font-feature-settings:"calt" 0}
a{color:var(--accent);text-decoration:none;cursor:pointer}a:hover{text-decoration:underline}

/* Navigation */
nav{position:sticky;top:0;z-index:100;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;height:52px;gap:8px}
nav .logo{font-weight:700;font-size:15px;color:var(--accent2);margin-right:24px;white-space:nowrap}
nav .tab{padding:10px 16px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;border-bottom:2px solid transparent;transition:all .15s;user-select:none}
nav .tab:hover{color:var(--text)}nav .tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* Main scroll container */
#main-scroll{height:calc(100vh - 52px);overflow-y:auto;overflow-x:hidden}
body.panel-open #main-scroll{position:fixed;width:100%;top:52px}

/* Views */
.view{display:none;padding:32px 40px;max-width:1400px;margin:0 auto}
.view.active{display:block}
h1{font-size:24px;font-weight:700;color:var(--accent2);margin-bottom:16px}
h2{font-size:18px;font-weight:600;color:var(--accent2);margin:28px 0 12px}
h3{font-size:15px;font-weight:600;color:var(--accent);margin:20px 0 8px}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.card-header{font-weight:600;font-size:15px;color:var(--accent2);margin-bottom:8px}

/* Tables */
table{width:100%;border-collapse:collapse;font-size:13px;margin:8px 0}
th{background:var(--bg3);color:var(--accent2);font-weight:600;text-align:left;padding:10px 12px;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:2}
td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text2)}
tr:hover td{background:var(--bg3);color:var(--text)}

/* ASCII diagram */
.ascii-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:24px;overflow-x:auto;font-family:'Fira Code',monospace;font-size:12px;line-height:1.5;white-space:pre;color:var(--text2)}
.ascii-box .mod-link{color:var(--accent);cursor:pointer;text-decoration:underline;text-decoration-style:dotted}
.ascii-box .mod-link:hover{color:var(--accent2);text-decoration-style:solid}

/* Side Panel */
#side-panel{position:fixed;top:52px;right:0;width:520px;height:calc(100vh - 52px);background:var(--bg2);border-left:1px solid var(--border);z-index:200;transform:translateX(100%);transition:transform .25s ease;overflow-y:auto;overscroll-behavior:contain;padding:28px}
#side-panel.open{transform:translateX(0)}
#panel-close{position:absolute;top:12px;right:16px;cursor:pointer;color:var(--text3);font-size:20px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:4px;background:none;border:none}
#panel-close:hover{background:var(--bg4);color:var(--text)}
#panel-title{font-size:18px;font-weight:700;color:var(--accent2);margin-bottom:4px}
#panel-path{font-size:12px;color:var(--text3);font-family:'Fira Code',monospace;margin-bottom:16px}
#panel-body{font-size:14px;color:var(--text2);line-height:1.7}
#panel-body p{margin-bottom:12px}
#panel-body .eq-block{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:16px;margin:12px 0;text-align:center;font-size:15px}
#panel-body .param-table{margin:12px 0}
#panel-body .param-table td{font-family:'Fira Code',monospace;font-size:12px}
#panel-body .decision-link{display:inline-block;background:var(--bg4);padding:2px 8px;border-radius:4px;font-size:12px;color:var(--accent);cursor:pointer;margin:2px}
#panel-body .decision-link:hover{background:var(--accent);color:var(--bg)}
.panel-section{margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.panel-section-title{font-size:13px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}

/* Decision cards */
.decision-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;cursor:pointer;transition:border-color .15s}
.decision-card:hover{border-color:var(--accent)}
.decision-card.expanded{border-color:var(--accent2)}
.decision-head{padding:16px 20px;display:flex;align-items:center;gap:12px}
.decision-id{font-family:'Fira Code',monospace;font-size:13px;color:var(--accent);font-weight:600;min-width:52px}
.decision-title{font-weight:600;font-size:14px;color:var(--text);flex:1}
.decision-date{font-size:12px;color:var(--text3);white-space:nowrap}
.decision-chevron{color:var(--text3);transition:transform .2s;font-size:12px}
.decision-card.expanded .decision-chevron{transform:rotate(90deg)}
.decision-body{padding:0 20px 20px;display:none;border-top:1px solid var(--border);margin-top:0}
.decision-card.expanded .decision-body{display:block;padding-top:16px}
.decision-body p{margin-bottom:10px;color:var(--text2);line-height:1.7}
.decision-body .why-box{background:var(--bg3);border-left:3px solid var(--accent2);padding:12px 16px;margin:12px 0;border-radius:0 6px 6px 0}
.decision-body .why-box-title{font-size:12px;font-weight:600;color:var(--accent2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}

/* Search */
#search-input{width:100%;padding:12px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:14px;font-family:'Inter',sans-serif;outline:none}
#search-input:focus{border-color:var(--accent)}
#search-results{margin-top:16px}
.search-hit{padding:12px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;cursor:pointer}
.search-hit:hover{border-color:var(--accent)}
.search-hit-type{font-size:11px;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.search-hit-title{font-size:14px;font-weight:600;margin-top:2px}
.search-hit-excerpt{font-size:12px;color:var(--text3);margin-top:4px}

/* Equation cards */
.eq-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px}
.eq-card-title{font-size:16px;font-weight:700;color:var(--accent2);margin-bottom:12px}
.eq-card .eq-main{background:var(--bg3);border-radius:6px;padding:20px;text-align:center;font-size:16px;margin:12px 0}
.eq-card .eq-explain{color:var(--text2);margin:12px 0;line-height:1.7}
.eq-card .var-table{margin:12px 0}
.eq-card .var-table td{font-size:12px;padding:6px 10px}
.eq-card .worked-example{background:var(--bg4);border-radius:6px;padding:16px;margin:12px 0;font-family:'Fira Code',monospace;font-size:12px;color:var(--accent2);line-height:1.6}

/* Plotly dark overrides */
.js-plotly-plot .plotly .main-svg{background:transparent !important}

/* Scrollbar */
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* Sub-tabs for data view */
.sub-tabs{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap}
.sub-tab{padding:6px 14px;font-size:12px;font-weight:500;color:var(--text3);background:var(--bg3);border:1px solid var(--border);border-radius:20px;cursor:pointer;transition:all .15s}
.sub-tab:hover{color:var(--text);border-color:var(--text3)}
.sub-tab.active{color:var(--accent);border-color:var(--accent);background:var(--bg4)}
.data-panel{display:none}.data-panel.active{display:block}

/* Tag badges */
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.tag-fix{background:#ef444422;color:#ef4444}
.tag-design{background:#6c8cff22;color:#6c8cff}
.tag-data{background:#f59e0b22;color:#f59e0b}
.tag-cal{background:#22c55e22;color:#22c55e}
.tag-val{background:#5eead422;color:#5eead4}
.tag-proj{background:#a855f722;color:#a855f7}

/* Lightbox overlay */
#lightbox{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);z-index:500;display:none;align-items:center;justify-content:center;cursor:zoom-out}
#lightbox.visible{display:flex}
#lightbox img{max-width:90vw;max-height:90vh;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,0.5)}
#lightbox-caption{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);color:#a0a4b8;font-size:14px;text-align:center;max-width:80vw}

/* Figure thumbnails */
.fig-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin:16px 0}
.fig-thumb{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:8px;cursor:pointer;transition:border-color .15s,transform .15s}
.fig-thumb:hover{border-color:var(--accent);transform:scale(1.02)}
.fig-thumb img{width:100%;border-radius:4px;display:block}
.fig-thumb .fig-label{font-size:11px;color:var(--text2);margin-top:6px;text-align:center;font-weight:500}

/* Calibration timeline */
.cal-timeline{position:relative;padding-left:32px;margin:20px 0}
.cal-timeline::before{content:'';position:absolute;left:12px;top:0;bottom:0;width:2px;background:var(--border)}
.cal-card{position:relative;margin-bottom:16px;padding:16px 20px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);transition:border-color .15s}
.cal-card:hover{border-color:var(--accent)}
.cal-dot{position:absolute;left:-26px;top:20px;width:12px;height:12px;border-radius:50%;border:2px solid var(--bg)}
.cal-dot.failed{background:#ef4444}.cal-dot.progress{background:#f59e0b}.cal-dot.success{background:#22c55e}
.cal-card-header{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.cal-card-id{font-family:'Fira Code',monospace;font-size:13px;font-weight:600;color:var(--accent)}
.cal-card-status{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;text-transform:uppercase}
.cal-card-status.failed{background:#ef444422;color:#ef4444}
.cal-card-status.progress{background:#f59e0b22;color:#f59e0b}
.cal-card-status.success{background:#22c55e22;color:#22c55e}
.cal-card-date{font-size:12px;color:var(--text3);margin-left:auto}
.cal-card-change{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.cal-card-issue{font-size:12px;color:var(--text2)}
.cal-card-cost{font-family:'Fira Code',monospace;font-size:12px;color:var(--accent2);margin-top:4px}

/* Try-it calculator */
.try-it{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin:16px 0}
.try-it-title{font-size:13px;font-weight:600;color:var(--accent2);margin-bottom:12px}
.try-it-row{display:flex;align-items:center;gap:12px;margin-bottom:8px;flex-wrap:wrap}
.try-it-row label{font-size:12px;color:var(--text2);min-width:100px}
.try-it-row input[type=range]{flex:1;min-width:120px;accent-color:var(--accent)}
.try-it-row .val-display{font-family:'Fira Code',monospace;font-size:12px;color:var(--accent);min-width:60px}
.try-it-result{background:var(--bg4);border-radius:6px;padding:12px 16px;margin-top:12px;font-family:'Fira Code',monospace;font-size:12px;color:var(--accent2);line-height:1.6;white-space:pre-wrap}
</style>
</head>
<body>
<nav>
  <div class="logo">Dixon Glacier DETIM</div>
  <div class="tab active" data-view="architecture">Architecture</div>
  <div class="tab" data-view="data">Data</div>
  <div class="tab" data-view="decisions">Decisions</div>
  <div class="tab" data-view="equations">Equations</div>
  <div class="tab" data-view="search">Search</div>
</nav>
<div id="main-scroll">
  <div id="view-architecture" class="view active"></div>
  <div id="view-data" class="view"></div>
  <div id="view-decisions" class="view"></div>
  <div id="view-equations" class="view"></div>
  <div id="view-search" class="view"></div>
</div>
<div id="lightbox" onclick="this.classList.remove('visible')"><img id="lightbox-img" src="" alt=""><div id="lightbox-caption"></div></div>
<div id="side-panel">
  <button id="panel-close">&times;</button>
  <div id="panel-title"></div>
  <div id="panel-path"></div>
  <div id="panel-body"></div>
</div>
<script src="figures.js"></script>
<script src="app.js"></script>
</body>
</html>
